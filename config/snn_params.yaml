# SNN FPGA Accelerator — Configuration Parameters
# Auto-generates: Verilog (.vh), Python (.py), C++ (.h) headers

## ── SNN Architecture ──
snn:
  total_neurons: 2048       # 16 groups × 128 neurons
  num_groups: 16
  neurons_per_group: 128
  data_width: 16             # Membrane potential bit width
  weight_width: 8            # Synaptic weight bit width
  threshold_width: 16
  refrac_width: 8
  leak_width: 4
  global_id_width: 11        # 2048 needs 11 bits
  group_id_width: 4          # 16 groups
  local_id_width: 7          # 128 per group

  # Routing
  spike_buffer_depth: 4096
  max_fanout_inter: 4
  num_parallel_units: 16

  # Learning
  stdp_enabled: true
  stdp_alpha_pot: 0.01       # Potentiation learning rate
  stdp_alpha_dep: 0.012      # Depression learning rate

## ── Electronic Warfare ──
ew:
  deception_types:
    - "range_gate_pull_off"
    - "velocity_gate_pull_off"
    - "inverse_amplitude_modulation"
    - "cross_eye_jamming"
    - "saturation_noise"
  drfm_depth: 4096           # Digital RF memory samples
  fh_channels: 128           # Frequency hopping channels
  pri_cycles: 100            # Pulse repetition interval
  phase_width: 16
  amplitude_width: 12

## ── Active Protection System ──
aps:
  enabled: true
  max_tracks: 32
  aoa_bins: 64               # Angle of arrival resolution
  ranging_bins: 256          # Range bins
  kill_cycles: 100           # Hard-kill effector pulse width
  safety_interlock: true     # Hardware interlock required

## ── Swarm Coordination ──
swarm:
  enabled: true
  hd_dim: 512                # HD vector dimensionality
  max_drones: 16
  consensus_threshold: 0.6   # Majority vote threshold

## ── ECC / Fault Tolerance ──
ecc:
  enabled: true
  protect_state: true        # Protect membrane potentials
  protect_weights: true
  watchdog_cycles: 100000    # ~1ms at 100 MHz
  syndrome_width: 4